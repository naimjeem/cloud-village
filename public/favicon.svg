  <rect x="14" y="40" width="3" height="4" fill="#ffe7a0"/>
  <rect x="19" y="40" width="3" height="4" fill="#ffe7a0"/>
  <!-- center vault -->
  <ellipse cx="32" cy="42" rx="9" ry="2.5" fill="#7b6cf6"/>
  <ellipse cx="32" cy="38" rx="7" ry="2" fill="#9085ff"/>
  <ellipse cx="32" cy="35" rx="5" ry="1.6" fill="#a89fff"/>
  <circle cx="32" cy="32" r="1.6" fill="#cfc8ff"/>
  <!-- right tower -->
  <rect x="46" y="30" width="6" height="18" fill="#9aa0a6"/>
